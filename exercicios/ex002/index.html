<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos</title>
</head>
<body>
    <h1>Parágrafos e quebras de linha</h1>
    <hr>
    <p>Voce pode escrever parágrafos de qualquer jeito. Basta colocar conteudo dentro da tag &lt;p&gt; e &lt;/p&gt;
    </p>
    <p>Vamos adicionar alguns simbolos especiais:
       &copy;&euro;&yen;&pound;&reg;&trade;&Delta;&uparrow; 
    </p>
    <p>Vamos adicionar alguns emojis:
        &#x1F643; &#x1F436; &#x1F469;&#x200D;&#x2764;&#xFE0F;&#x200D;&#x1F48B;&#x200D;&#x1F468;
    </p>
</body>
</html>
